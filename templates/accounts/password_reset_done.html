<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Store – Correo Enviado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif; min-height: 100vh;
    background: linear-gradient(135deg, #f9c6e0 0%, #f06fa1 40%, #e03e7c 100%);
    display: flex; align-items: center; justify-content: center; padding: 30px 16px;
  }
  .card {
    background: white; border-radius: 24px; padding: 52px 48px; text-align: center;
    width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(192,36,106,0.25);
  }
  .success-icon { font-size: 4rem; margin-bottom: 16px; }
  .card-title { font-size: 1.3rem; font-weight: 700; color: #2d1a2e; margin-bottom: 12px; }
  .card-sub { font-size: 0.88rem; color: #888; line-height: 1.7; margin-bottom: 28px; }
  .btn-main {
    display: inline-block; padding: 12px 32px;
    background: linear-gradient(135deg, #f06fa1, #e03e7c);
    color: white; border-radius: 10px; font-weight: 700;
    text-decoration: none; font-size: 0.95rem; transition: opacity 0.2s;
  }
  .btn-main:hover { opacity: 0.9; color: white; }
  .hint { font-size: 0.8rem; color: #bbb; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="success-icon">📧</div>
  <div class="card-title">¡Correo enviado!</div>
  <div class="card-sub">
    Hemos enviado un enlace de recuperación a tu correo electrónico.<br>
    Revisa tu bandeja de entrada y sigue las instrucciones.<br><br>
    <strong>Si no ves el correo, revisa tu carpeta de spam.</strong>
  </div>
  <a href="{% url 'login' %}" class="btn-main">
    <i class="fas fa-arrow-left me-2"></i>Volver al Login
  </a>
  <div class="hint">El enlace expira en 24 horas.</div>
</div>
</body>
</html>
