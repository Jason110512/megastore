<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Store – Recuperar Contraseña</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif; min-height: 100vh;
    background: linear-gradient(135deg, #f9c6e0 0%, #f06fa1 40%, #e03e7c 100%);
    display: flex; align-items: center; justify-content: center; padding: 30px 16px;
  }
  .card {
    background: white; border-radius: 24px; padding: 44px 48px;
    width: 100%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(192,36,106,0.25);
  }
  .brand { text-align: center; margin-bottom: 28px; }
  .brand-icon { font-size: 3rem; margin-bottom: 8px; }
  .brand-name { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #f06fa1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .card-title { font-size: 1.2rem; font-weight: 700; color: #2d1a2e; margin-bottom: 6px; }
  .card-sub { font-size: 0.85rem; color: #999; margin-bottom: 28px; line-height: 1.6; }
  .input-wrap { position: relative; margin-bottom: 18px; }
  .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #ccc; }
  .input-wrap input {
    width: 100%; padding: 12px 14px 12px 42px;
    border: 2px solid #f0ddf5; border-radius: 10px;
    font-size: 0.92rem; font-family: 'Poppins', sans-serif;
    background: #fdf5fb; outline: none; transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: #e03e7c; background: white; }
  .btn-main {
    width: 100%; padding: 13px; background: linear-gradient(135deg, #f06fa1, #e03e7c);
    color: white; border: none; border-radius: 10px; font-size: 1rem;
    font-weight: 700; cursor: pointer; font-family: 'Poppins', sans-serif;
    transition: opacity 0.2s; margin-top: 4px;
  }
  .btn-main:hover { opacity: 0.9; }
  .back-link { text-align: center; margin-top: 16px; font-size: 0.85rem; color: #999; }
  .back-link a { color: #8b5cf6; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">🛍️</div>
    <div class="brand-name">MEGA STORE</div>
  </div>
  <div class="card-title"><i class="fas fa-lock-open me-2" style="color:#e03e7c;"></i>Recuperar Contraseña</div>
  <div class="card-sub">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</div>

  {% if messages %}
    {% for msg in messages %}
      <div style="background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:0.84rem;margin-bottom:14px;">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="input-wrap">
      <i class="fas fa-envelope input-icon"></i>
      <input type="email" name="email" placeholder="Correo Electrónico" required>
    </div>
    <button type="submit" class="btn-main">
      <i class="fas fa-paper-plane me-2"></i>Enviar enlace de recuperación
    </button>
  </form>

  <div class="back-link">
    <a href="{% url 'login' %}"><i class="fas fa-arrow-left me-1"></i>Volver al inicio de sesión</a>
  </div>
</div>
</body>
</html>
